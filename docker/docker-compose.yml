version: '3.8'

services:
  # Next.js Frontend
  frontend:
    build:
      context: ../frontend
      dockerfile: DockerFile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - craftvision-network

  # .NET Gateway (YARP)
  gateway:
    image: mcr.microsoft.com/dotnet/aspnet:9.0
    ports:
      - "8080:80"
    networks:
      - craftvision-network

  # .NET Backend Service
  backend:
    image: mcr.microsoft.com/dotnet/aspnet:9.0
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=craftvision;Username=postgres;Password=postgres
    networks:
      - craftvision-network
    depends_on:
      - postgres
      - redis
      - kafka

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=craftvision
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - craftvision-network

  # Redis Cache & SignalR Backplane
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - craftvision-network

  # Kafka Message Broker
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - craftvision-network

  kafka:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - zookeeper
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    networks:
      - craftvision-network

volumes:
  postgres-data:

networks:
  craftvision-network:
    driver: bridge
